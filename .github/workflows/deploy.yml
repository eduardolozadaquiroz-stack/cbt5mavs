name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build with OpenNext for Cloudflare
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Prepare Pages deploy directory
        run: |
          mkdir -p .pages-dist
          cp -r .open-next/assets/. .pages-dist/
          cp .open-next/worker.js .pages-dist/_worker.js
          for dir in cloudflare middleware server-functions; do
            [ -d ".open-next/$dir" ] && cp -r ".open-next/$dir" .pages-dist/
          done
          [ -d ".open-next/.build" ] && cp -r .open-next/.build .pages-dist/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .pages-dist --project-name cbt5mavs --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
